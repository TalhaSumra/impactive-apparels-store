services:
  - type: web
    name: impactive-apparels-store
    runtime: docker
    dockerfilePath: ./Dockerfile
    autoDeployTrigger: commit
    healthCheckPath: /up
    envVars:
      - key: APP_NAME
        value: Impactive Apparels
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: APP_KEY
        generateValue: true
      - key: LOG_CHANNEL
        value: stderr
      - key: LOG_LEVEL
        value: info
      - key: DB_CONNECTION
        value: pgsql
      - key: DB_URL
        fromDatabase:
          name: impactive-apparels-db
          property: connectionString
      - key: SESSION_DRIVER
        value: database
      - key: SESSION_SECURE_COOKIE
        value: "true"
      - key: CACHE_STORE
        value: database
      - key: QUEUE_CONNECTION
        value: sync
      - key: MAIL_MAILER
        value: log
databases:
  - name: impactive-apparels-db
    databaseName: impactive_apparels
    user: impactive_apparels
